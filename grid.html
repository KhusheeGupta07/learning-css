<!DOCTYPE html>
<html lang="en">
<head>
    <style>
.comtainer {  display: grid;
grid-template-columns: 50px 100px;
grid-template-rows: 50px 100px;}


.item1 {  grid-column: 1/2;
grid-row:2 /2; background-color: blueviolet;
}

.item2{  grid-column:2 /2;
grid-row: 1/2; background-color: aqua;
}

.item3 {  grid-column: 1/2;
grid-row:2 /2; background-color: chartreuse;
}

.item4{  grid-column: 2/2;
grid-row:2 /2;  background-color: cornflowerblue;
}
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="comtainer">
        <div class="item1"> item1</div>
         <div class="item2"> item2</div>
          <div class="item3"> item3</div>
           <div class="item4"> item4</div>
    </div>
</body>
</html>
