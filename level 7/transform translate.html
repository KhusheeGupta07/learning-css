<!DOCTYPE html>
<html lang="en">
<head><style>
.box {height: 50px;  width: 50px;   position: relative;top: 50px;  left: 100px;
border: 2px solid black;  background-color: aquamarine; border-radius: 5px;
transition-property: all;
transition-duration: 5s;
transition-delay: 0s;
transition-timing-function: ease-in-out;
display: flex;  }

#box1:hover{   transform: translate(50px); background-color: blueviolet;}
#box2:hover{  transform:translate(50px,50px); background-color: blueviolet; }
#box3:hover{  transform: translateX(50px); background-color: blueviolet; }
#box4:hover{  transform:translateY(100px); background-color: blueviolet; }
#box5:hover {  transform: translateZ(50px); background-color: blueviolet;}
#box6:hover { transform: translate3d(50px 50px 50px); background-color: chartreuse;}
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="box1"  class="box" > box1</div>
    <div id="box2"  class="box" > box2</div>
    <div id="box3"  class="box" > box3</div>
     <div id="box4"  class="box" > box4</div>
     <div id="box5" class="box">box5</div>
    <div id="box6"  class="box">box6</div>
</body>
</html>
