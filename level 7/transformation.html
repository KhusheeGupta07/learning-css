<!DOCTYPE html>
<html lang="en">
<head><style>
.box {height: 50px;  width: 50px;   position: relative;top: 50px;  left: 100px;
border: 2px solid black;  background-color: aquamarine; border-radius: 5px;
transition-property: all;
transition-duration: 5s;
transition-delay: 0s;
transition-timing-function: ease-in-out;
display: flex;
}

#box1:hover {  background-color: blueviolet;
transform: rotateX(180deg);}
#box4:hover {background-color: chartreuse;
    transform: rotate(45deg); }
  #box3:hover {background-color: chartreuse;
 transform: rotateY(180deg); }
  #box2:hover {background-color: chartreuse;
 transform: rotateZ(180deg); }


</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="box1"  class="box"  > box1</div>
      <div id="box2"  class="box"  > box2</div>
        <div id="box3"  class="box"  > box3</div>
          <div id="box4"  class="box"  > box4</div>
</body>
</html>
