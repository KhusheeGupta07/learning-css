<!DOCTYPE html>
<html lang="en">
<head><style>
    .box{height: 50px;  width: 50px;   position: relative;top: 50px;  left: 100px;
border: 2px solid black;  background-color: aquamarine; border-radius: 5px;
transition-property: all;
transition-duration: 5s;
transition-delay: 0s;
transition-timing-function: ease-in-out;
display: flex;  }

#box1:hover { transform: skew(90deg); }
#box2:hover {  transform: skew(45deg); }
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="box1" class="box" >box1</div>
    <div id="box2" class="box" >box2</div>
</body>
</html>
